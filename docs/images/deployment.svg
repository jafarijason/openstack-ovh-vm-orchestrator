<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    Deployment Architecture
  </text>

  <!-- Development Setup -->
  <g id="development">
    <rect x="30" y="70" width="380" height="280" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
    <text x="220" y="95" font-size="16" font-weight="bold" text-anchor="middle" fill="#1976D2">
      🖥️ Local Development
    </text>

    <!-- Frontend Dev -->
    <rect x="50" y="115" width="170" height="80" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" rx="3"/>
    <text x="135" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">React Dev Server</text>
    <text x="135" y="152" font-size="9" text-anchor="middle" fill="#555">npm run dev</text>
    <text x="135" y="165" font-size="9" text-anchor="middle" fill="#555">Port 5174</text>
    <text x="135" y="178" font-size="9" text-anchor="middle" fill="#555">Hot Reload</text>

    <!-- Backend Dev -->
    <rect x="230" y="115" width="170" height="80" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" rx="3"/>
    <text x="315" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Uvicorn Dev Server</text>
    <text x="315" y="152" font-size="9" text-anchor="middle" fill="#555">--reload</text>
    <text x="315" y="165" font-size="9" text-anchor="middle" fill="#555">Port 8000</text>
    <text x="315" y="178" font-size="9" text-anchor="middle" fill="#555">Auto Reload</text>

    <!-- Mock Provider -->
    <rect x="50" y="215" width="350" height="125" fill="#F0F4C3" stroke="#9CCC65" stroke-width="1" rx="3"/>
    <text x="225" y="235" font-size="11" font-weight="bold" text-anchor="middle" fill="#558B2F">Mock Cloud Provider</text>
    <text x="225" y="255" font-size="9" text-anchor="middle" fill="#555">In-Memory Storage</text>
    <text x="225" y="270" font-size="9" text-anchor="middle" fill="#555">Sample Data Included</text>
    <text x="225" y="285" font-size="9" text-anchor="middle" fill="#555">✓ No credentials needed</text>
    <text x="225" y="300" font-size="9" text-anchor="middle" fill="#555">✓ Instant feedback</text>
    <text x="225" y="315" font-size="9" text-anchor="middle" fill="#555">✓ Perfect for testing</text>
  </g>

  <!-- Docker Compose Setup -->
  <g id="docker-compose">
    <rect x="430" y="70" width="380" height="280" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="5"/>
    <text x="620" y="95" font-size="16" font-weight="bold" text-anchor="middle" fill="#7B1FA2">
      🐳 Docker Compose
    </text>

    <!-- Frontend Container -->
    <rect x="450" y="115" width="170" height="80" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="1" rx="3"/>
    <text x="535" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Frontend Container</text>
    <text x="535" y="152" font-size="9" text-anchor="middle" fill="#555">React Build</text>
    <text x="535" y="165" font-size="9" text-anchor="middle" fill="#555">Port 5174</text>
    <text x="535" y="178" font-size="9" text-anchor="middle" fill="#555">nginx/serve</text>

    <!-- Backend Container -->
    <rect x="630" y="115" width="170" height="80" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="1" rx="3"/>
    <text x="715" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">API Container</text>
    <text x="715" y="152" font-size="9" text-anchor="middle" fill="#555">FastAPI + Uvicorn</text>
    <text x="715" y="165" font-size="9" text-anchor="middle" fill="#555">Port 8000</text>
    <text x="715" y="178" font-size="9" text-anchor="middle" fill="#555">Health Check</text>

    <!-- Network -->
    <rect x="450" y="215" width="350" height="65" fill="#F8BBD0" stroke="#AD1457" stroke-width="1" rx="3"/>
    <text x="625" y="235" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Docker Network</text>
    <text x="625" y="253" font-size="9" text-anchor="middle" fill="#555">Frontend ↔ API communication via network bridge</text>
    <text x="625" y="268" font-size="9" text-anchor="middle" fill="#555">✓ Isolated environment | ✓ Easy to share | ✓ Production-like</text>
  </g>

  <!-- Production Setup -->
  <g id="production">
    <rect x="830" y="70" width="340" height="280" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="5"/>
    <text x="1000" y="95" font-size="16" font-weight="bold" text-anchor="middle" fill="#2E7D32">
      ☁️ Production (K8s/Cloud)
    </text>

    <!-- Frontend Pod -->
    <rect x="850" y="115" width="150" height="80" fill="#C8E6C9" stroke="#1B5E20" stroke-width="1" rx="3"/>
    <text x="925" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Frontend Pod</text>
    <text x="925" y="152" font-size="9" text-anchor="middle" fill="#555">React Build</text>
    <text x="925" y="165" font-size="9" text-anchor="middle" fill="#555">Replicas: 3</text>
    <text x="925" y="178" font-size="9" text-anchor="middle" fill="#555">CDN/LoadBal</text>

    <!-- Backend Pod -->
    <rect x="1020" y="115" width="150" height="80" fill="#C8E6C9" stroke="#1B5E20" stroke-width="1" rx="3"/>
    <text x="1095" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">API Pod</text>
    <text x="1095" y="152" font-size="9" text-anchor="middle" fill="#555">FastAPI</text>
    <text x="1095" y="165" font-size="9" text-anchor="middle" fill="#555">Replicas: 5</text>
    <text x="1095" y="178" font-size="9" text-anchor="middle" fill="#555">Auto-scaling</text>

    <!-- Real Cloud -->
    <rect x="850" y="215" width="320" height="125" fill="#A5D6A7" stroke="#00600D" stroke-width="1" rx="3"/>
    <text x="1010" y="235" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Real Cloud Infrastructure</text>
    <text x="1010" y="255" font-size="9" text-anchor="middle" fill="#555">✓ OVH OpenStack</text>
    <text x="1010" y="270" font-size="9" text-anchor="middle" fill="#555">✓ Auto-scaling with metrics</text>
    <text x="1010" y="285" font-size="9" text-anchor="middle" fill="#555">✓ Multi-region ready</text>
    <text x="1010" y="300" font-size="9" text-anchor="middle" fill="#555">✓ Database persistence</text>
    <text x="1010" y="315" font-size="9" text-anchor="middle" fill="#555">✓ Load balancing</text>
  </g>

  <!-- CI/CD Pipeline -->
  <g id="cicd">
    <rect x="30" y="400" width="1140" height="140" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="5"/>
    <text x="600" y="425" font-size="16" font-weight="bold" text-anchor="middle" fill="#E65100">
      🔄 CI/CD Pipeline (GitHub Actions)
    </text>

    <!-- Stage boxes -->
    <g font-size="10" text-anchor="middle">
      <rect x="50" y="445" width="120" height="80" fill="#FFE0B2" stroke="#BF360C" stroke-width="1" rx="3"/>
      <text x="110" y="465" font-weight="bold" fill="#333">1. Trigger</text>
      <text x="110" y="480" font-size="9" fill="#555">Push to GitHub</text>
      <text x="110" y="493" font-size="9" fill="#555">PR created</text>
      <text x="110" y="506" font-size="9" fill="#555">Schedule</text>

      <rect x="195" y="445" width="120" height="80" fill="#FFE0B2" stroke="#BF360C" stroke-width="1" rx="3"/>
      <text x="255" y="465" font-weight="bold" fill="#333">2. Test</text>
      <text x="255" y="480" font-size="9" fill="#555">pytest</text>
      <text x="255" y="493" font-size="9" fill="#555">Coverage</text>
      <text x="255" y="506" font-size="9" fill="#555">Lint/Type</text>

      <rect x="340" y="445" width="120" height="80" fill="#FFE0B2" stroke="#BF360C" stroke-width="1" rx="3"/>
      <text x="400" y="465" font-weight="bold" fill="#333">3. Build</text>
      <text x="400" y="480" font-size="9" fill="#555">Docker build</text>
      <text x="400" y="493" font-size="9" fill="#555">Frontend</text>
      <text x="400" y="506" font-size="9" fill="#555">Backend</text>

      <rect x="485" y="445" width="120" height="80" fill="#FFE0B2" stroke="#BF360C" stroke-width="1" rx="3"/>
      <text x="545" y="465" font-weight="bold" fill="#333">4. Security</text>
      <text x="545" y="480" font-size="9" fill="#555">Scan deps</text>
      <text x="545" y="493" font-size="9" fill="#555">Check secrets</text>
      <text x="545" y="506" font-size="9" fill="#555">Trivy scan</text>

      <rect x="630" y="445" width="120" height="80" fill="#FFE0B2" stroke="#BF360C" stroke-width="1" rx="3"/>
      <text x="690" y="465" font-weight="bold" fill="#333">5. Push</text>
      <text x="690" y="480" font-size="9" fill="#555">Registry push</text>
      <text x="690" y="493" font-size="9" fill="#555">Docker Hub</text>
      <text x="690" y="506" font-size="9" fill="#555">Artifacts</text>

      <rect x="775" y="445" width="120" height="80" fill="#FFE0B2" stroke="#BF360C" stroke-width="1" rx="3"/>
      <text x="835" y="465" font-weight="bold" fill="#333">6. Deploy</text>
      <text x="835" y="480" font-size="9" fill="#555">K8s update</text>
      <text x="835" y="493" font-size="9" fill="#555">Rolling release</text>
      <text x="835" y="506" font-size="9" fill="#555">Health check</text>

      <rect x="920" y="445" width="120" height="80" fill="#FFE0B2" stroke="#BF360C" stroke-width="1" rx="3"/>
      <text x="980" y="465" font-weight="bold" fill="#333">7. Monitor</text>
      <text x="980" y="480" font-size="9" fill="#555">Logs</text>
      <text x="980" y="493" font-size="9" fill="#555">Metrics</text>
      <text x="980" y="506" font-size="9" fill="#555">Alerts</text>
    </g>

    <!-- Arrows between stages -->
    <g stroke="#999" stroke-width="1" marker-end="url(#arrowhead)">
      <line x1="170" y1="485" x2="195" y2="485"/>
      <line x1="315" y1="485" x2="340" y2="485"/>
      <line x1="460" y1="485" x2="485" y2="485"/>
      <line x1="605" y1="485" x2="630" y2="485"/>
      <line x1="750" y1="485" x2="775" y2="485"/>
      <line x1="895" y1="485" x2="920" y2="485"/>
    </g>
  </g>

  <!-- Development Workflow Box -->
  <rect x="30" y="600" width="1140" height="80" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="5"/>
  <text x="600" y="620" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Development Workflow</text>

  <g font-size="10" text-anchor="start" fill="#555">
    <text x="50" y="645">1. Local Dev: Run docker-compose up (no config needed, uses mock provider)</text>
    <text x="50" y="663">2. Write Code: Frontend in React, Backend in FastAPI (auto-reload enabled)</text>

    <text x="600" y="645">3. Test Locally: pytest --cov=api tests/ (see 49% coverage with 23+ passing tests)</text>
    <text x="600" y="663">4. Push to GitHub: CI/CD runs tests, security scans, builds Docker images, deploys</text>
  </g>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#999"/>
    </marker>
  </defs>
</svg>
