<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    Supported Resources & Operations
  </text>

  <!-- VMs Resource -->
  <g id="vms-resource">
    <rect x="30" y="70" width="230" height="300" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
    <text x="145" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976D2">
      🖥️ Virtual Machines
    </text>

    <g font-size="10" text-anchor="start" fill="#555">
      <text x="50" y="120" font-weight="bold" fill="#333">CRUD Operations:</text>
      <text x="70" y="135">✓ POST /vms (Create)</text>
      <text x="70" y="150">✓ GET /vms (List)</text>
      <text x="70" y="165">✓ GET /vms/{id} (Get)</text>
      <text x="70" y="180">✓ DELETE /vms/{id}</text>

      <text x="50" y="200" font-weight="bold" fill="#333">Lifecycle:</text>
      <text x="70" y="215">✓ POST .../action</text>
      <text x="70" y="230">  - start</text>
      <text x="70" y="245">  - stop</text>
      <text x="70" y="260">  - reboot</text>

      <text x="50" y="280" font-weight="bold" fill="#333">Properties:</text>
      <text x="70" y="295">id, name, status, image_id,</text>
      <text x="70" y="310">flavor_id, networks, volumes,</text>
      <text x="70" y="325">key_name, security_groups,</text>
      <text x="70" y="340">metadata, created_at, ...</text>
    </g>

    <rect x="50" y="355" width="190" height="30" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" rx="3"/>
    <text x="145" y="373" font-size="9" text-anchor="middle" fill="#333">5 Lifecycle States</text>
  </g>

  <!-- Networks Resource -->
  <g id="networks-resource">
    <rect x="290" y="70" width="230" height="300" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="5"/>
    <text x="405" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E7D32">
      🌐 Networks
    </text>

    <g font-size="10" text-anchor="start" fill="#555">
      <text x="310" y="120" font-weight="bold" fill="#333">Operations:</text>
      <text x="330" y="135">✓ GET /networks (List)</text>
      <text x="330" y="150">✓ GET /networks/{id}</text>

      <text x="310" y="170" font-weight="bold" fill="#333">Network Types:</text>
      <text x="330" y="185">External (Public)</text>
      <text x="330" y="200">Private/Internal</text>
      <text x="330" y="215">Shared Networks</text>

      <text x="310" y="235" font-weight="bold" fill="#333">Properties:</text>
      <text x="330" y="250">id, name, status,</text>
      <text x="330" y="265">external flag,</text>
      <text x="330" y="280">shared flag,</text>
      <text x="330" y="295">subnets, created_at,</text>
      <text x="330" y="310">updated_at, ...</text>

      <text x="310" y="330" font-weight="bold" fill="#333">Status:</text>
      <text x="330" y="345">ACTIVE, DOWN, ...</text>
    </g>

    <rect x="310" y="355" width="190" height="30" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1" rx="3"/>
    <text x="405" y="373" font-size="9" text-anchor="middle" fill="#333">Support 3+ sample networks</text>
  </g>

  <!-- Images Resource -->
  <g id="images-resource">
    <rect x="550" y="70" width="230" height="300" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="5"/>
    <text x="665" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF9800">
      🖼️ Images
    </text>

    <g font-size="10" text-anchor="start" fill="#555">
      <text x="570" y="120" font-weight="bold" fill="#333">Operations:</text>
      <text x="590" y="135">✓ GET /images (List)</text>
      <text x="590" y="150">✓ GET /images/{id}</text>

      <text x="570" y="170" font-weight="bold" fill="#333">Supported Images:</text>
      <text x="590" y="185">Ubuntu 22.04 LTS</text>
      <text x="590" y="200">Debian 12 Bookworm</text>
      <text x="590" y="215">CentOS 8 Stream</text>
      <text x="590" y="230">Rocky Linux 9</text>

      <text x="570" y="250" font-weight="bold" fill="#333">Properties:</text>
      <text x="590" y="265">id, name, description,</text>
      <text x="590" y="280">disk_format, size,</text>
      <text x="590" y="295">visibility (public),</text>
      <text x="590" y="310">status, created_at, ...</text>

      <text x="570" y="330" font-weight="bold" fill="#333">Formats:</text>
      <text x="590" y="345">qcow2 (OpenStack), bare</text>
    </g>

    <rect x="570" y="355" width="190" height="30" fill="#FFE0B2" stroke="#E65100" stroke-width="1" rx="3"/>
    <text x="665" y="373" font-size="9" text-anchor="middle" fill="#333">4+ pre-loaded images</text>
  </g>

  <!-- Flavors Resource -->
  <g id="flavors-resource">
    <rect x="810" y="70" width="230" height="300" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="5"/>
    <text x="925" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#7B1FA2">
      ⚙️ Flavors (VM Sizes)
    </text>

    <g font-size="10" text-anchor="start" fill="#555">
      <text x="830" y="120" font-weight="bold" fill="#333">Operations:</text>
      <text x="850" y="135">✓ GET /flavors (List)</text>
      <text x="850" y="150">✓ GET /flavors/{id}</text>

      <text x="830" y="170" font-weight="bold" fill="#333">Available Flavors:</text>
      <text x="850" y="185">m1.small (1vCPU, 2GB RAM)</text>
      <text x="850" y="200">m1.medium (2vCPU, 4GB)</text>
      <text x="850" y="215">m1.large (4vCPU, 8GB)</text>
      <text x="850" y="230">m1.xlarge (8vCPU, 16GB)</text>

      <text x="830" y="250" font-weight="bold" fill="#333">Properties:</text>
      <text x="850" y="265">id, name, vcpus,</text>
      <text x="850" y="280">ram_mb, disk_gb,</text>
      <text x="850" y="295">ephemeral_gb, ...</text>

      <text x="830" y="315" font-weight="bold" fill="#333">Common Use:</text>
      <text x="850" y="330">Select when creating VMs</text>
    </g>

    <rect x="830" y="355" width="190" height="30" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="1" rx="3"/>
    <text x="925" y="373" font-size="9" text-anchor="middle" fill="#333">4+ standard flavors</text>
  </g>

  <!-- SSH Keys Resource -->
  <g id="sshkeys-resource">
    <rect x="30" y="420" width="230" height="260" fill="#FFEBEE" stroke="#C62828" stroke-width="2" rx="5"/>
    <text x="145" y="445" font-size="14" font-weight="bold" text-anchor="middle" fill="#C62828">
      🔑 SSH Keys
    </text>

    <g font-size="10" text-anchor="start" fill="#555">
      <text x="50" y="470" font-weight="bold" fill="#333">Operations:</text>
      <text x="70" y="485">✓ GET /ssh-keys (List)</text>
      <text x="70" y="500">✓ GET /ssh-keys/{name}</text>

      <text x="50" y="520" font-weight="bold" fill="#333">Key Management:</text>
      <text x="70" y="535">• Pre-upload your SSH</text>
      <text x="70" y="550">  public keys</text>
      <text x="70" y="565">• Reference by name in</text>
      <text x="70" y="580">  VM creation</text>

      <text x="50" y="600" font-weight="bold" fill="#333">Properties:</text>
      <text x="70" y="615">name, fingerprint,</text>
      <text x="70" y="630">public_key, created_at, ...</text>
    </g>

    <rect x="50" y="645" width="190" height="30" fill="#F5A5A5" stroke="#B71C1C" stroke-width="1" rx="3"/>
    <text x="145" y="663" font-size="9" text-anchor="middle" fill="#333">3+ sample keys</text>
  </g>

  <!-- Pagination & Filtering -->
  <g id="pagination">
    <rect x="290" y="420" width="520" height="260" fill="#F5F5F5" stroke="#999" stroke-width="2" rx="5"/>
    <text x="550" y="445" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
      🔍 Pagination & Common Patterns
    </text>

    <g font-size="11" text-anchor="start" fill="#555">
      <text x="310" y="475" font-weight="bold" fill="#333">Pagination Query Parameters:</text>
      <text x="330" y="495" font-family="monospace" fill="#d3d3d3">limit=10  # Results per page (default: 100)</text>
      <text x="330" y="515" font-family="monospace" fill="#d3d3d3">offset=0  # Skip N results (for pagination)</text>

      <text x="310" y="540" font-weight="bold" fill="#333">Cloud Selection:</text>
      <text x="330" y="560" font-family="monospace" fill="#d3d3d3">?cloud=mock      # Use mock provider</text>
      <text x="330" y="580" font-family="monospace" fill="#d3d3d3">?cloud=ovh       # Use OVH OpenStack</text>

      <text x="310" y="605" font-weight="bold" fill="#333">Example Request:</text>
      <text x="330" y="625" font-family="monospace" fill="#d3d3d3">GET /vms?limit=10&offset=0&cloud=mock</text>

      <text x="310" y="650" font-weight="bold" fill="#333">Response Format:</text>
      <text x="330" y="670" font-family="monospace" fill="#d3d3d3">{ "success": true, "data": [...], "message": null }</text>
    </g>
  </g>

  <!-- Resource Matrix -->
  <g id="resource-matrix">
    <rect x="810" y="420" width="360" height="260" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
    <text x="990" y="445" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976D2">
      📊 Resource Operations Matrix
    </text>

    <!-- Table header -->
    <g font-size="10" font-weight="bold" text-anchor="middle">
      <rect x="830" y="465" width="80" height="25" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
      <text x="870" y="482" fill="#333">Resource</text>

      <rect x="910" y="465" width="60" height="25" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
      <text x="940" y="482" fill="#333">List</text>

      <rect x="970" y="465" width="60" height="25" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
      <text x="1000" y="482" fill="#333">Get</text>

      <rect x="1030" y="465" width="60" height="25" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
      <text x="1060" y="482" fill="#333">Create</text>

      <rect x="1090" y="465" width="60" height="25" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
      <text x="1120" y="482" fill="#333">Delete</text>
    </g>

    <!-- Table rows -->
    <g font-size="9" text-anchor="center" fill="#333">
      <rect x="830" y="490" width="80" height="25" fill="#F1F8E9" stroke="#999" stroke-width="0.5"/>
      <text x="870" y="507">VMs</text>

      <rect x="910" y="490" width="60" height="25" fill="#F1F8E9" stroke="#999" stroke-width="0.5"/>
      <text x="940" y="507">✓</text>

      <rect x="970" y="490" width="60" height="25" fill="#F1F8E9" stroke="#999" stroke-width="0.5"/>
      <text x="1000" y="507">✓</text>

      <rect x="1030" y="490" width="60" height="25" fill="#F1F8E9" stroke="#999" stroke-width="0.5"/>
      <text x="1060" y="507">✓</text>

      <rect x="1090" y="490" width="60" height="25" fill="#F1F8E9" stroke="#999" stroke-width="0.5"/>
      <text x="1120" y="507">✓</text>

      <!-- Repeat for other resources -->
      <rect x="830" y="515" width="80" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="870" y="532">Networks</text>
      <rect x="910" y="515" width="60" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="940" y="532">✓</text>
      <rect x="970" y="515" width="60" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="1000" y="532">✓</text>
      <rect x="1030" y="515" width="120" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="1090" y="532">Planned</text>

      <rect x="830" y="540" width="80" height="25" fill="#F1F8E9" stroke="#999" stroke-width="0.5"/>
      <text x="870" y="557">Images</text>
      <rect x="910" y="540" width="60" height="25" fill="#F1F8E9" stroke="#999" stroke-width="0.5"/>
      <text x="940" y="557">✓</text>
      <rect x="970" y="540" width="60" height="25" fill="#F1F8E9" stroke="#999" stroke-width="0.5"/>
      <text x="1000" y="557">✓</text>
      <rect x="1030" y="540" width="120" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="1090" y="557">N/A</text>

      <rect x="830" y="565" width="80" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="870" y="582">Flavors</text>
      <rect x="910" y="565" width="60" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="940" y="582">✓</text>
      <rect x="970" y="565" width="60" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="1000" y="582">✓</text>
      <rect x="1030" y="565" width="120" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="1090" y="582">N/A</text>

      <rect x="830" y="590" width="80" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="870" y="607">SSH Keys</text>
      <rect x="910" y="590" width="60" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="940" y="607">✓</text>
      <rect x="970" y="590" width="60" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="1000" y="607">✓</text>
      <rect x="1030" y="590" width="120" height="25" fill="#FFF9C4" stroke="#999" stroke-width="0.5"/>
      <text x="1090" y="607">N/A</text>
    </g>

    <text x="990" y="635" font-size="9" text-anchor="middle" fill="#555">✓ = Implemented | Planned = Coming soon | N/A = Not applicable</text>
  </g>
</svg>
