<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    VM Creation API Request Flow
  </text>

  <!-- Step 1: Client -->
  <g id="step1">
    <rect x="50" y="80" width="150" height="80" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="5"/>
    <text x="125" y="105" font-size="12" font-weight="bold" text-anchor="middle" fill="#1976D2">Step 1</text>
    <text x="125" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Client</text>
    <text x="125" y="145" font-size="10" text-anchor="middle" fill="#555">POST /vms</text>
    <text x="125" y="160" font-size="10" text-anchor="middle" fill="#555">{name, image_id, ...}</text>
  </g>

  <!-- Arrow -->
  <line x1="200" y1="120" x2="250" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: HTTP Route -->
  <g id="step2">
    <rect x="250" y="80" width="150" height="80" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="5"/>
    <text x="325" y="105" font-size="12" font-weight="bold" text-anchor="middle" fill="#7B1FA2">Step 2</text>
    <text x="325" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">HTTP Route</text>
    <text x="325" y="145" font-size="10" text-anchor="middle" fill="#555">@router.post("/vms")</text>
    <text x="325" y="160" font-size="10" text-anchor="middle" fill="#555">Validate Request</text>
  </g>

  <!-- Arrow -->
  <line x1="400" y1="120" x2="450" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Service Layer -->
  <g id="step3">
    <rect x="450" y="80" width="150" height="80" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" rx="5"/>
    <text x="525" y="105" font-size="12" font-weight="bold" text-anchor="middle" fill="#388E3C">Step 3</text>
    <text x="525" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Service Layer</text>
    <text x="525" y="145" font-size="10" text-anchor="middle" fill="#555">vm_service.create_vm()</text>
    <text x="525" y="160" font-size="10" text-anchor="middle" fill="#555">Business Logic</text>
  </g>

  <!-- Arrow -->
  <line x1="600" y1="120" x2="650" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Provider -->
  <g id="step4">
    <rect x="650" y="80" width="150" height="80" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="5"/>
    <text x="725" y="105" font-size="12" font-weight="bold" text-anchor="middle" fill="#E65100">Step 4</text>
    <text x="725" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Provider</text>
    <text x="725" y="145" font-size="10" text-anchor="middle" fill="#555">provider.create_server()</text>
    <text x="725" y="160" font-size="10" text-anchor="middle" fill="#555">API Call</text>
  </g>

  <!-- Arrow -->
  <line x1="800" y1="120" x2="850" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Cloud -->
  <g id="step5">
    <rect x="850" y="80" width="120" height="80" fill="#FFEBEE" stroke="#C62828" stroke-width="2" rx="5"/>
    <text x="910" y="105" font-size="12" font-weight="bold" text-anchor="middle" fill="#C62828">Step 5</text>
    <text x="910" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Cloud</text>
    <text x="910" y="145" font-size="10" text-anchor="middle" fill="#555">Create VM</text>
    <text x="910" y="160" font-size="10" text-anchor="middle" fill="#555">Infrastructure</text>
  </g>

  <!-- Return arrows (dotted) -->
  <line x1="850" y1="200" x2="800" y2="240" stroke="#999" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-gray)"/>
  <line x1="800" y1="200" x2="600" y2="240" stroke="#999" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-gray)"/>
  <line x1="600" y1="200" x2="400" y2="240" stroke="#999" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-gray)"/>
  <line x1="400" y1="200" x2="200" y2="240" stroke="#999" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-gray)"/>

  <!-- Response boxes -->
  <g id="responses">
    <rect x="50" y="300" width="150" height="100" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2" rx="5"/>
    <text x="125" y="325" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Response</text>
    <text x="125" y="345" font-size="10" text-anchor="middle" fill="#555">201 Created</text>
    <text x="125" y="363" font-size="9" text-anchor="middle" fill="#555">{</text>
    <text x="125" y="378" font-size="9" text-anchor="middle" fill="#555">id: "vm-123"</text>
    <text x="125" y="393" font-size="9" text-anchor="middle" fill="#555">status: "BUILDING"</text>

    <rect x="250" y="300" width="150" height="100" fill="#BBDEFB" stroke="#1565C0" stroke-width="2" rx="5"/>
    <text x="325" y="325" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Success</text>
    <text x="325" y="345" font-size="10" text-anchor="middle" fill="#555">VM Object</text>
    <text x="325" y="365" font-size="9" text-anchor="middle" fill="#555">with all</text>
    <text x="325" y="378" font-size="9" text-anchor="middle" fill="#555">properties:</text>
    <text x="325" y="393" font-size="9" text-anchor="middle" fill="#555">name, image, flavor...</text>

    <rect x="450" y="300" width="150" height="100" fill="#F1F8E9" stroke="#558B2F" stroke-width="2" rx="5"/>
    <text x="525" y="325" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Service Logic</text>
    <text x="525" y="345" font-size="10" text-anchor="middle" fill="#555">Validates</text>
    <text x="525" y="363" font-size="9" text-anchor="middle" fill="#555">Orchestrates</text>
    <text x="525" y="378" font-size="9" text-anchor="middle" fill="#555">Returns VM</text>
    <text x="525" y="393" font-size="9" text-anchor="middle" fill="#555">with metadata</text>

    <rect x="650" y="300" width="150" height="100" fill="#FFE0B2" stroke="#E65100" stroke-width="2" rx="5"/>
    <text x="725" y="325" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Abstraction</text>
    <text x="725" y="345" font-size="10" text-anchor="middle" fill="#555">Same interface</text>
    <text x="725" y="363" font-size="9" text-anchor="middle" fill="#555">Mock or Real</text>
    <text x="725" y="378" font-size="9" text-anchor="middle" fill="#555">OpenStack</text>
    <text x="725" y="393" font-size="9" text-anchor="middle" fill="#555">Interchangeable</text>
  </g>

  <!-- Key Features Box -->
  <rect x="50" y="480" width="900" height="100" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="5"/>
  <text x="500" y="505" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Key Design Features</text>

  <g id="features" font-size="10" text-anchor="start" fill="#555">
    <text x="70" y="530">✓ Layered Architecture: Each layer handles one concern</text>
    <text x="70" y="548">✓ Type Safety: Pydantic validation at every step</text>
    <text x="70" y="566">✓ Error Handling: Custom exceptions → HTTP status codes</text>

    <text x="550" y="530">✓ Provider Abstraction: Swap Mock ↔ OpenStack instantly</text>
    <text x="550" y="548">✓ Async/Await: Non-blocking I/O for scalability</text>
    <text x="550" y="566">✓ Auto OpenAPI: Schema generated from types</text>
  </g>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#666"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#999"/>
    </marker>
  </defs>
</svg>
